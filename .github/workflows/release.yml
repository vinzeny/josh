name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish, for example v0.1.6
        required: true
  push:
    tags:
      - "v*"

jobs:
  build-macos:
    name: Build macOS (${{ matrix.label }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Apple Silicon
            runner: macos-15
            arch: arm64
          - label: Intel
            runner: macos-15-intel
            arch: x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build release artifacts
        run: npm run build && npx electron-forge make --platform=darwin --arch=${{ matrix.arch }}

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: |
            release/make/*.dmg
            release/make/zip/darwin/${{ matrix.arch }}/*.zip

  publish:
    name: Publish release
    runs-on: ubuntu-latest
    needs: build-macos
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Resolve release tag
        id: release_tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          case "$tag" in
            v*)
              ;;
            *)
              echo "Release tag must start with v, got: $tag" >&2
              exit 1
              ;;
          esac

          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Download workflow artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Create or publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ steps.release_tag.outputs.tag }}
        run: |
          tag="${RELEASE_TAG}"

          if gh release view "$tag" --repo "$GH_REPO" >/dev/null 2>&1; then
            echo "Release $tag already exists, reusing it."
          else
            gh release create "$tag" --repo "$GH_REPO" --draft --generate-notes --title "$tag"
          fi

          find release-artifacts -type f \( -name '*.dmg' -o -name '*.zip' \) -print0 |
            xargs -0 gh release upload "$tag" --repo "$GH_REPO" --clobber

          gh release edit "$tag" --repo "$GH_REPO" --draft=false --prerelease=false --title "$tag"
