name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-macos:
    name: Build macOS (${{ matrix.label }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Apple Silicon
            runner: macos-15
            arch: arm64
          - label: Intel
            runner: macos-15-intel
            arch: x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build release artifacts
        run: npm run build && npx electron-forge make --platform=darwin --arch=${{ matrix.arch }}

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: |
            release/make/*.dmg
            release/make/zip/darwin/${{ matrix.arch }}/*.zip

  publish:
    name: Publish draft release
    runs-on: ubuntu-latest
    needs: build-macos
    permissions:
      contents: write

    steps:
      - name: Download workflow artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Create or update draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF_NAME}"

          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists, reusing it."
          else
            gh release create "$tag" --draft --generate-notes --title "$tag"
          fi

          find release-artifacts -type f \( -name '*.dmg' -o -name '*.zip' \) -print0 |
            xargs -0 gh release upload "$tag" --clobber
